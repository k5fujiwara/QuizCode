<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BeEnカリキュラム</title>
    <link rel="icon" href="./svg/favicon.svg?v=20260506-2" type="image/svg+xml" sizes="any" />
    <link rel="shortcut icon" href="./svg/favicon.svg?v=20260506-2" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app app--wide">
      <header class="header">
        <div class="brand">
          <h1 class="brand-name">
            <img class="brand-logo" src="./svg/logo_white.svg" alt="BeEngineer" />
          </h1>
        </div>
        <p class="tagline">コースごとの年間カリキュラムを確認できます。</p>
      </header>

      <main>
        <div class="toolbar">
          <a class="btn btn-ghost" href="./index.html">← クイズに戻る</a>
          <span class="toolbar-badge" id="curriculumYear">カリキュラム</span>
        </div>

        <section class="panel curriculum-controls">
          <h2 class="panel-title">カリキュラム</h2>
          <p class="hint" id="curriculumHint">データを読み込み中です…</p>
          <label class="field-block" for="curriculumCourseSelect">
            <span class="inline-label">表示するコース</span>
            <select id="curriculumCourseSelect" class="select" disabled>
              <option value="">— 読み込み中 —</option>
            </select>
          </label>
        </section>

        <section class="panel curriculum-panel">
          <div class="curriculum-summary" id="curriculumSummary"></div>
          <div class="curriculum-list" id="curriculumList"></div>
        </section>
      </main>

    </div>

    <script src="curriculum.js" defer></script>
  </body>
</html>
